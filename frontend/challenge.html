<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#070D15" />
  <title>AIO-Gym · 挑战 RL</title>
  <link rel="stylesheet" href="./css/tier0.css" />
  <link rel="stylesheet" href="./css/challenge.css?v=11" />
</head>
<body class="cd">
  <div class="cd-app" id="cd-app">

    <!-- ===== Topbar ===== -->
    <header class="cd-top">
      <a class="cd-back" href="./index.html" title="返回沙盘 / Back to sandbox">‹</a>
      <div class="cd-title">
        <span class="cd-title-main" data-zh="挑战 RL" data-en="Beat the RL" data-ja="RL に挑戦">挑战 RL</span>
        <span class="cd-title-sub mono" id="cd-sub">—</span>
      </div>
      <span class="cd-clock mono" id="cd-clock" title="剩余时间 / Time left">0:00</span>
      <button id="cd-lang" class="cd-lang" title="中文 / English / 日本語">EN</button>
    </header>

    <!-- ===== Scoreboard: you vs RL economic score ===== -->
    <section class="cd-board">
      <div class="cd-score cd-you">
        <span class="cd-score-lbl"><i class="dot"></i><span data-zh="你" data-en="You" data-ja="あなた">你</span></span>
        <span class="cd-score-val mono" id="cd-you-profit">0</span>
      </div>
      <div class="cd-versus">
        <span class="cd-vs-cap" data-zh="经济分" data-en="ECONOMY" data-ja="経済スコア">经济分</span>
        <div class="cd-bar"><i class="cd-bar-you" id="cd-bar-you"></i><i class="cd-bar-rl" id="cd-bar-rl"></i></div>
        <span class="cd-lead mono" id="cd-lead">—</span>
      </div>
      <div class="cd-score cd-rl">
        <span class="cd-score-lbl"><span>RL</span><i class="dot"></i></span>
        <span class="cd-score-val mono" id="cd-rl-profit">0</span>
      </div>
    </section>

    <!-- ===== Plant P&ID — two views: you | RL, same plant, side by side ===== -->
    <section class="cd-arena">
      <div class="cd-view">
        <span class="cd-view-tag you"><i class="dot"></i><span data-zh="你" data-en="You" data-ja="あなた">你</span></span>
        <div class="cd-sch" id="cd-arena-you"></div>
      </div>
      <div class="cd-view">
        <span class="cd-view-tag rl"><i class="dot"></i>RL</span>
        <div class="cd-sch" id="cd-arena-rl"></div>
      </div>
    </section>

    <!-- ===== Compare strip (generic: kWh/rate + on-spec/temp) ===== -->
    <section class="cd-compare">
      <span class="cd-cmp"><i class="dot you"></i><span data-zh="你" data-en="You" data-ja="あなた">你</span> <b id="cd-cmp-a" class="mono">0</b> <span id="cd-cmp-ab-lbl" class="cd-cmp-u">kWh</span></span>
      <span class="cd-cmp"><i class="dot rl"></i>RL <b id="cd-cmp-b" class="mono">0</b></span>
      <span class="cd-cmp"><span id="cd-cmp-c-lbl" class="cd-cmp-u">—</span> <b id="cd-cmp-c" class="cd-cmp-v mono">—</b></span>
    </section>

    <!-- ===== Controls: built dynamically per level ===== -->
    <section class="cd-controls" id="cd-controls"></section>

    <div class="cd-toast-host" id="cd-toast"></div>
  </div>

  <!-- ===== Overlay: intro / results ===== -->
  <div class="cd-overlay" id="cd-overlay"><div class="cd-card" id="cd-card"></div></div>

  <script type="module" src="./js/challenge/challenge.js?v=17"></script>
</body>
</html>
