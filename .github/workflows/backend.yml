name: Backend checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    env:
      PYTHONPYCACHEPREFIX: /tmp/aiogym_pycache

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: aiogym/pyproject.toml
      - name: Install AIO-Gym
        run: python -m pip install -e "./aiogym[dev]"
      - name: Compile Python modules
        run: python -m compileall -q aiogym
      - name: Check generated model cards
        run: aiogym-model-cards --check --format markdown --out-dir docs/model_cards
      - name: Run regression tests
        run: python aiogym/tests/test_regressions.py
      - name: Run interface tests
        run: python aiogym/tests/test_interface.py
      - name: Run crystallization tests
        run: python aiogym/tests/test_crystallization.py
      - name: Run objective and transition contract tests
        run: >-
          python -m unittest
          aiogym.tests.test_objectives
          aiogym.tests.test_transitions
          -v
      - name: Run frontend parity tests
        run: python aiogym/tests/test_parity.py
      - name: Run benchmark smoke test
        run: >-
          python -m aiogym.cli.suite_benchmark
          --suite standard-baselines
          --scenarios cstr
          --objectives tracking
          --controllers pid,mpc
          --episodes 1
          --episode-steps 2
          --artifact-dir /tmp/aiogym_suite_smoke
      - name: Validate benchmark artifacts
        run: python -c "from aiogym import check_benchmark_artifacts; assert check_benchmark_artifacts('/tmp/aiogym_suite_smoke')['ok']"
      - name: Check patch whitespace
        run: git diff --check
