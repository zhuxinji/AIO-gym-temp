name: Backend checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    env:
      PYTHONPYCACHEPREFIX: /tmp/aiogym_pycache

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install AIO-Gym
        run: python -m pip install -e ".[dev]"
      - name: Compile Python modules
        run: python -m compileall -q aiogym
      - name: Check CLI catalog
        run: aiogym list scenarios
      - name: Run test suite
        run: python -m pytest -q aiogym/tests
      - name: Run benchmark smoke test
        run: >-
          aiogym benchmark suite
          --suite standard-baselines
          --scenarios cstr
          --objectives tracking
          --controllers pid,mpc
          --episodes 1
          --episode-steps 2
          --artifact-dir /tmp/aiogym_suite_smoke
      - name: Validate benchmark artifacts
        run: aiogym artifacts check /tmp/aiogym_suite_smoke
      - name: Check patch whitespace
        run: git diff --check
